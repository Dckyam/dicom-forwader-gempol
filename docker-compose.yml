version: '3.8'

services:
  dicom-router:
    image: registry.dto.kemkes.go.id/pub/dicom-router:latest
    container_name: dicom-router-gempol
    restart: always
    ports:
      - "11116:11112"
      - "18084:8080"
    environment:
      - ORG_ID=100479900
      - CLIENT=vpQdk6as5K4UOZnlmmiatZzGyMydADzdvZWHkVfGUqmG7eAj
      - SECRET=VMIA3Z2GubiuGEoCQIX9rmIvWQ0edTOvK5R7A22ZAyaUtCMucirHd7louiyislAd
      - URL=https://api-satusehat.kemkes.go.id
      - AE_TITLE=DCMROUTER
    volumes:
      - "./out:/app/out"
      - "./logs:/app/logs"
    networks:
      - dicom-net-gempol

  dicom-forwarder:
    build: ./forwarder
    container_name: dicom-forwarder-gempol
    restart: unless-stopped
    ports:
      - "13004:3000"
    volumes:
      - "./state:/state"
    environment:
      - FTP_HOST=10.6.1.22
      - FTP_PORT=2121
      - FTP_USER=admin
      - FTP_PASS=J4nganM4suk
      - FTP_DIR=/
      - ROUTER_AET=DCMROUTER
      - ROUTER_HOST=dicom-router
      - ROUTER_PORT=11112
      - MAX_RETRIES=3
      - UI_PORT=3000
      - TZ=Asia/Jakarta
    depends_on:
      - dicom-router
    networks:
      - dicom-net-gempol

networks:
  dicom-net-gempol:
    driver: bridge